<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💕 Welcome</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Satisfy&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Satisfy', cursive;
            background: linear-gradient(135deg, #BDA6CE 0%, #A2CB8B 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 900px;
            width: 100%;
            text-align: center;
            animation: fadeIn 0.6s ease-in;
        }

        h1 {
            color: white;
            font-size: 48px;
            margin-bottom: 60px;
            text-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px;
            margin-bottom: 40px;
        }

        .card {
            background: white;
            padding: 40px 30px;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 250px;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
        }

        .card-icon {
            font-size: 60px;
            margin-bottom: 20px;
            display: block;
        }

        .card-title {
            font-size: 32px;
            color: #BDA6CE;
            margin-bottom: 10px;
        }

        .card-description {
            font-size: 16px;
            color: #999;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 36px;
                margin-bottom: 40px;
            }

            .grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .card {
                min-height: 200px;
                padding: 30px 20px;
            }

            .card-title {
                font-size: 24px;
            }

            .card-icon {
                font-size: 48px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Choose Your Adventure</h1>
        
        <div class="grid">
            <a href="message.html" class="card">
                <span class="card-icon">💌</span>
                <div class="card-title">Message</div>
                <div class="card-description">Read my heart</div>
            </a>
            
            <a href="song.html" class="card">
                <span class="card-icon">🎵</span>
                <div class="card-title">Song</div>
                <div class="card-description">Our melody</div>
            </a>
            
            <a href="picture.html" class="card">
                <span class="card-icon">📸</span>
                <div class="card-title">Pictures</div>
                <div class="card-description">Memories</div>
            </a>
            
            <a href="video.html" class="card">
                <span class="card-icon">🎬</span>
                <div class="card-title">Videos</div>
                <div class="card-description">Moments</div>
            </a>
        </div>
    </div>
</body>
</html>
