<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Videos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Satisfy&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Satisfy', cursive;
            background: linear-gradient(135deg, #BDA6CE 0%, #A2CB8B 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            animation: fadeIn 0.6s ease-in;
        }

        .back-btn {
            display: inline-block;
            padding: 12px 24px;
            background: white;
            border-radius: 12px;
            text-decoration: none;
            color: #BDA6CE;
            font-weight: bold;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
            font-family: 'Satisfy', cursive;
            font-size: 16px;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        h1 {
            color: white;
            text-align: center;
            font-size: 42px;
            margin-bottom: 40px;
            text-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            perspective: 1000px;
        }

        .video-polaroid {
            background: white;
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            text-align: center;
            transition: all 0.3s ease;
            transform-origin: center;
        }

        .video-polaroid:nth-child(1) { transform: rotate(-3deg); }
        .video-polaroid:nth-child(2) { transform: rotate(3deg); }

        .video-polaroid:hover {
            transform: translateY(-10px) rotate(0deg) !important;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
        }

        .video-container {
            width: 100%;
            height: 280px;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .polaroid-caption {
            font-family: 'Satisfy', cursive;
            font-size: 16px;
            color: #BDA6CE;
            padding: 10px 0 5px 0;
            font-weight: bold;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .back-btn {
                display: block;
                width: 100%;
                text-align: center;
            }

            h1 {
                font-size: 32px;
                margin-bottom: 30px;
            }

            .gallery {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .video-container {
                height: 250px;
            }
        }
    </style>
</head>
<body>
   

    <script>
        window.addEventListener('load', () => {
            const audio = document.getElementById('backgroundMusic');
            audio.play().catch(err => console.log('Audio autoplay not allowed:', err));
        });
    </script>
</body>
</html>
