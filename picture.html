<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📸 Pictures</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Satisfy&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Satisfy', cursive;
            background: linear-gradient(135deg, #BDA6CE 0%, #A2CB8B 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            animation: fadeIn 0.6s ease-in;
        }

        .back-btn {
            display: inline-block;
            padding: 12px 24px;
            background: white;
            border-radius: 12px;
            text-decoration: none;
            color: #BDA6CE;
            font-weight: bold;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
            font-family: 'Satisfy', cursive;
            font-size: 16px;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        h1 {
            color: white;
            text-align: center;
            font-size: 42px;
            margin-bottom: 40px;
            text-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            perspective: 1000px;
        }

        .polaroid {
            background: white;
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            text-align: center;
            transition: all 0.3s ease;
            transform-origin: center;
        }

        .polaroid img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 4px;
            display: block;
            margin-bottom: 10px;
        }

        .polaroid-caption {
            font-family: 'Satisfy', cursive;
            font-size: 14px;
            color: #999;
            min-height: 25px;
            padding-bottom: 5px;
        }

        /* Random rotations for scrapbook effect */
        .polaroid:nth-child(1) { transform: rotate(-4deg); }
        .polaroid:nth-child(2) { transform: rotate(3deg); }
        .polaroid:nth-child(3) { transform: rotate(-2deg); }
        .polaroid:nth-child(4) { transform: rotate(4deg); }
        .polaroid:nth-child(5) { transform: rotate(-3deg); }
        .polaroid:nth-child(6) { transform: rotate(2deg); }
        .polaroid:nth-child(7) { transform: rotate(-5deg); }
        .polaroid:nth-child(8) { transform: rotate(3deg); }
        .polaroid:nth-child(9) { transform: rotate(-2deg); }
        .polaroid:nth-child(10) { transform: rotate(4deg); }

        .polaroid:hover {
            transform: translateY(-10px) rotate(0deg) !important;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .back-btn {
                display: block;
                width: 100%;
                text-align: center;
            }

            h1 {
                font-size: 32px;
                margin-bottom: 30px;
            }

            .gallery {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 20px;
            }

            .polaroid img {
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="home.html" class="back-btn">← Back</a>
        
        <h1>📸 Our Memories</h1>
        
        <div class="gallery">
            <div class="polaroid">
                <img src="pic1.jfif" alt="Memory 1">
                <div class="polaroid-caption">Smile</div>
            </div>
            <div class="polaroid">
                <img src="pic2.jfif" alt="Memory 2">
                <div class="polaroid-caption">Happy</div>
            </div>
            <div class="polaroid">
                <img src="pic3.jfif" alt="Memory 3">
                <div class="polaroid-caption">Joy</div>
            </div>
            <div class="polaroid">
                <img src="pic4.jfif" alt="Memory 4">
                <div class="polaroid-caption">Laugh</div>
            </div>
            <div class="polaroid">
                <img src="pic5.jfif" alt="Memory 5">
                <div class="polaroid-caption">Love</div>
            </div>
            <div class="polaroid">
                <img src="pic6.jfif" alt="Memory 6">
                <div class="polaroid-caption">Care</div>
            </div>
            <div class="polaroid">
                <img src="pic7.jfif" alt="Memory 7">
                <div class="polaroid-caption">Dream</div>
            </div>
            <div class="polaroid">
                <img src="pic8.jfif" alt="Memory 8">
                <div class="polaroid-caption">Forever</div>
            </div>
            <div class="polaroid">
                <img src="pic9.jfif" alt="Memory 9">
                <div class="polaroid-caption">Together</div>
            </div>
            <div class="polaroid">
                <img src="pic10.jfif" alt="Memory 10">
                <div class="polaroid-caption">Always</div>
            </div>
        </div>
    </div>
</body>
</html>
